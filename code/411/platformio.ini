[platformio]
default_envs = stm32f411

[env:stm32f411]
platform = ststm32
board = genericSTM32F411CE
framework = stm32cube
extra_scripts = pre:platformio_pre_extra_sources.py

# 使用软浮点以避免框架编译冲突
build_flags =
    -DHSE_VALUE=8000000U
    -DSTM32F411xE
    -DUSE_HAL_DRIVER
    -DSTM32F411xx
    -DconfigENABLE_FPU=1
    -DconfigUSE_FPU=1
    -DconfigGENERATE_RUN_TIME_STATS=0
    -DconfigUSE_STATS_FORMATTING_FUNCTIONS=0
    -DconfigUSE_IDLE_HOOK=0
    -DconfigUSE_TICK_HOOK=0
    -DconfigUSE_MALLOC_FAILED_HOOK=0
    -DconfigCHECK_FOR_STACK_OVERFLOW=0
    -DconfigUSE_DAEMON_TASK_STARTUP_HOOK=0
    -Dmcpu=cortex-m4
    -mthumb
    -mfpu=fpv4-sp-d16
    -mfloat-abi=softfp
    -Wall
    -Wno-strict-aliasing
    -fno-strict-aliasing
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -Os
    -DUART1_SMOKE_TEST=1
    #
    # 项目头文件路径
    #
    -ICore/Inc
    -Isrc
    -IHardware
    -IControl
    -IPID
    -Isystem_param
    -IDrivers/STM32F4xx_HAL_Driver/Inc
    -IDrivers/CMSIS/Device/ST/STM32F4xx/Include
    -IDrivers/CMSIS/Core/Include
    -IDrivers/CMSIS/RTOS2/Include
    -IMiddlewares/Third_Party/FreeRTOS/Source/include
    -IMiddlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS_V2
    -IMiddlewares/Third_Party/FreeRTOS/Source/portable/GCC/ARM_CM4F

# 显式包含项目源码和本地 FreeRTOS/CMSIS 源文件
build_src_filter =
    +<*.c>
    +<Core/Src/*.c>
    +<Hardware/*.c>
    +<Control/*.c>
    +<PID/*.c>
    +<system_param/*.c>
    -<Core/Src/stm32f4xx_hal_timebase_tim.c>

upload_protocol = stlink
debug_tool = stlink
board_build.f_cpu = 100000000L
monitor_speed = 460800
